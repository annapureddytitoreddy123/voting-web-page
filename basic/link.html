<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>link</title>
  <style>
    .container {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px;
}

.see-more-btn {
  background-color: #007bff;
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 5px;
  cursor: pointer;
  transition: background-color 0.3s;
}

.see-more-btn:hover {
  background-color: #0056b3;
}
  </style>
</head>
<body>
  <div class="container">
    <button class="see-more-btn">See More</button>
  </div>
</body>
</html>
